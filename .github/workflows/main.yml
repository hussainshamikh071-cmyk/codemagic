name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'  # Uses latest stable
          # flutter-version: '3.22.4'  # Remove this line
          
      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get
          
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: safety-guardian-apk
          path: build/app/outputs/flutter-apk/app-release.apk
