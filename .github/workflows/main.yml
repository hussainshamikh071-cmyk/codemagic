name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Don't specify version - use latest stable
          
      - name: Go to Flutter project
        working-directory: ./untitled8
        run: echo "Now in Flutter project"
          
      - name: Get dependencies
        working-directory: ./untitled8
        run: |
          flutter clean
          flutter pub get
          
      - name: Build APK
        working-directory: ./untitled8
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: safety-guardian-apk
          path: untitled8/build/app/outputs/flutter-apk/app-release.apk
