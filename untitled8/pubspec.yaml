name: untitled8
description: "Safety Guardian App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.0.0

  # UI
  provider: ^6.1.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Location
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1

  # Permissions & Utilities
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.0

  # AI
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^5.1.0

  # SOS Features
  speech_to_text: ^7.0.0
  sensors_plus: ^6.1.1
  android_intent_plus: ^6.0.0
  image_picker: ^1.1.2

  # Notifications
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env